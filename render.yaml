services:
  # 1. GraftAI Monolith API
  - type: web
    name: graftai-monolith
    runtime: docker
    dockerfilePath: backend/Dockerfile
    region: oregon
    plan: starter
    # Automatically run migrations before deployment
    preDeployCommand: "cd backend && alembic upgrade head"
    envVars:
      - key: ENV
        value: production
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: graftai-db
          property: connectionString
      # Secrets should be set in the Render Dashboard
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false

# Managed Postgres
databases:
  - name: graftai-db
    plan: free
    region: oregon
