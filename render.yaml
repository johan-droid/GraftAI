services:
  # 1. GraftAI API (FastAPI)
  - type: web
    name: graftai-api
    env: docker
    dockerfilePath: backend/Dockerfile
    region: oregon # or your preferred region
    plan: free # or starter for more power
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: graftai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: graftai-redis
          property: connectionString
      # Pull other secrets from Render Dashboard (e.g. STRIPE_API_KEY, GOOGLE_CLIENT_ID)
      - fromGroup: graftai-secrets

  # 2. Arq Background Worker
  - type: worker
    name: graftai-worker
    env: docker
    dockerfilePath: backend/Dockerfile
    # Overriding the default CMD for the worker
    dockerCommand: arq backend.worker.WorkerSettings
    region: oregon
    plan: free
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: graftai-redis
          property: connectionString
      - fromGroup: graftai-secrets

# 3. Redis Instance (Rate Limiting & Tasks)
databases:
  - name: graftai-redis
    type: redis
    plan: free
    region: oregon
    ipAllowList: [] # Redis 6.2+ VPC only by default on Render

# 4. Managed Postgres (Optional if already using Neon, but here for completeness)
# If using Neon, remove this and provide NEON_DATABASE_URL in graftai-secrets
# databases:
#   - name: graftai-db
#     plan: free
#     region: oregon
