version: "3.9"
services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: graftai
      POSTGRES_PASSWORD: graftai
      POSTGRES_DB: graftai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - ./backend/.env
    environment:
      ENV: production
      DATABASE_URL: postgresql+asyncpg://graftai:graftai@postgres:5432/graftai
      REDIS_URL: redis://redis:6379/0
      # CORS origins must now trust the load balancer and frontend
      CORS_ORIGINS: http://localhost:8000,http://localhost:3000
      ENABLED_AUTH_METHODS: "sso,passwordless,mfa"

  # Custom Load Balancer for horizontal scaling
  load_balancer:
    build: 
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
         condition: service_healthy
    ports:
      - "8000:80"
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - load_balancer
    env_file:
      - ./frontend/.env.production
    environment:
      - NODE_ENV=production
      # Frontend now talks to the Load Balancer proxying the backend
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
