services:
  # 1. GraftAI Monolith API
  - type: web
    name: graftai-monolith
    runtime: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
    # Wait for the deploy to complete, migrations run automatically on startup via FastAPI Lifespan
    envVars:
      - key: ENV
        value: production
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: graftai-db
          property: connectionString
      # Secrets should be set in the Render Dashboard
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false

# Managed Postgres
databases:
  - name: graftai-db
    plan: free
    region: oregon
