[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=backend
    --cov-report=term-missing
    --cov-report=html:htmlcov
    # TODO: Coverage target regressed; track and restore to 70 in GH-0000
    #       Temporary set to 70 as the project target. If this causes CI failures,
    #       create/track issue GH-0000 and follow the remediation plan.
    --cov-fail-under=70
markers =
    unit: Unit tests
    integration: Integration tests (require database)
    slow: Slow tests
    ai: AI agent tests
    api: API endpoint tests
