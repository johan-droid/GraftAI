version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: graftai
      POSTGRES_PASSWORD: graftai
      POSTGRES_DB: graftai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 3
    depends_on:
      - postgres
      - redis
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    env_file:
      - ./backend/.env
    environment:
      ENV: production
      DATABASE_URL: postgresql+asyncpg://graftai:graftai@postgres:5432/graftai
      REDIS_URL: redis://redis:6379/0
      FORCE_GROQ: "1"
      # CORS origins must trust the load balancer and frontend
      CORS_ORIGINS: http://localhost:8000,http://localhost:3000
      ENABLED_AUTH_METHODS: "sso,passwordless,mfa"
      TRUSTED_PROXY_IPS: "127.0.0.1,load_balancer"

  # Custom Load Balancer (Nginx)
  load_balancer:
    build: 
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "8000:80"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 3
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=/api

volumes:
  postgres_data:
