services:
  # 1. GraftAI Monolith API
  - type: web
    name: graftai-monolith
    runtime: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn api.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
    envVars:
      - key: ENV
        value: production
      - key: PYTHONPATH
        value: .
      - key: BACKEND_URL
        value: https://graftai.onrender.com
      - key: FRONTEND_URL
        value: https://www.graftai.tech
      - key: FRONTEND_BASE_URL
        value: https://www.graftai.tech
      - key: DATABASE_URL
        fromDatabase:
          name: graftai-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://graftai.onrender.com/api/v1/auth/google/callback
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        value: https://graftai.onrender.com/api/v1/auth/microsoft/callback
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: graftai-db
    plan: free
    region: oregon
