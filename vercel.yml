version: 2
build:
  env:
    NEXT_PUBLIC_API_BASE_URL: "$NEXT_PUBLIC_API_BASE_URL"
    BETTER_AUTH_URL: "$BETTER_AUTH_URL"
    NEXT_PUBLIC_BETTER_AUTH_URL: "$NEXT_PUBLIC_BETTER_AUTH_URL"

# For a monorepo, we build frontend from its own folder and deploy it.
projects:
  - src: "frontend"
    use: "@vercel/next"

# If you use a separate hosted API, ensure BACKEND_URL is configured in env
# at deployment time; CORS should only allow frontend origin.
