[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=backend
    --cov-report=term-missing
    --cov-report=html:htmlcov
    # Current visible suite baseline is ~30%; track restoration to 70 in GH-0000.
    --cov-fail-under=29
markers =
    unit: Unit tests
    integration: Integration tests (require database)
    slow: Slow tests
    ai: AI agent tests
    api: API endpoint tests
