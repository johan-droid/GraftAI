# Render.com deployment configuration for GraftAI
# This file configures the production deployment on Render
# See PRODUCTION_DEPLOYMENT.md for detailed setup instructions

services:
  # GraftAI Backend API Service
  - type: web
    name: graftai-api
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn api.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
    envVars:
      - key: ENV
        value: production
      - key: PYTHONPATH
        value: .
      - key: BACKEND_URL
        value: https://graftai.onrender.com
      - key: TRUSTED_HOSTS
        # Restrict trusted hosts to the app's own Render and public frontend domains.
        # Use exact domain names for production and avoid broad wildcard host allowlists.
        value: "graftai.onrender.com,www.graftai.tech"
      - key: FRONTEND_URL
        value: https://www.graftai.tech
      - key: FRONTEND_BASE_URL
        value: https://www.graftai.tech
      - key: DATABASE_URL
        fromDatabase:
          name: graftai-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://graftai.onrender.com/api/v1/auth/google/callback
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        value: https://graftai.onrender.com/api/v1/auth/microsoft/callback
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      
      # Email (Resend)
      - key: RESEND_API_KEY
        sync: false
      
      # Payments (Stripe)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      
      # Better Auth
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        value: https://www.graftai.tech
      
      # MFA / TOTP Encryption (Generate with: openssl rand -hex 32)
      - key: TOTP_ENCRYPTION_KEY
        sync: false
      
      # Monitoring (Sentry - Optional)
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      
      # Security Alerts (Slack/Discord Webhook - Optional)
      - key: SECURITY_WEBHOOK_URL
        sync: false

# Note: Redis must be created manually in Render Dashboard
# Then add REDIS_URL environment variable to this service

databases:
  - name: graftai-db
    plan: starter
    region: oregon
    ipAllowList: []
