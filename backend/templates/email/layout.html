<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #030712;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            color: #f8fafc;
        }
        .header {
            padding: 60px 20px 40px;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: #f8fafc;
            text-decoration: none;
            display: inline-block;
        }
        .logo span {
            color: #6366f1;
        }
        .content {
            padding: 0 20px;
        }
        .card {
            background-color: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 16px 0;
            color: #ffffff;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #94a3b8;
            margin: 0 0 20px 0;
        }
        .button {
            display: inline-block;
            padding: 18px 36px;
            background-color: #6366f1;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        .footer {
            padding: 60px 20px;
            text-align: center;
        }
        .footer p {
            font-size: 13px;
            color: #475569;
            line-height: 1.8;
        }
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 20px;
        }
        .badge-primary { background-color: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3); }
        .badge-success { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .badge-warning { background-color: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{{ frontend_url }}" class="logo">Graft<span>AI</span></a>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>&copy; 2026 GraftAI Technologies. All rights reserved.<br>
            Autonomous Scheduling for the Sovereign Individual.</p>
        </div>
    </div>
</body>
</html>
