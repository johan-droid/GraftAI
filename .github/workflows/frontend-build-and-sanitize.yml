name: Frontend build & sanitize

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--trace-warnings"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      BACKEND_URL: "http://localhost:8000"
      NEXTAUTH_SECRET: "test-secret-value-please-change"
      AUTH_SECRET: "test-secret-value-please-change"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Sanitize service worker (safety)
        working-directory: frontend
        run: npm run normalize-sw
